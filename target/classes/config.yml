storage:
  type: YAML # YAML, SQLITE, MYSQL
  mysql:
    host: localhost
    port: 3306
    database: postmaster
    username: root
    password: change_me
    pool-size: 10

mail:
  expire-days: 30
  page-size: 45

notifications:
  chat: true
  title: true
  sound: true
  title-main: "&6New Mail"
  title-sub: "&fUse /mail to claim it"
  chat-format: "&6&lInbox &8»  &fYou have new mail. Use &e/mail"
  sound-key: ENTITY_EXPERIENCE_ORB_PICKUP

messages:
  no-permission: "&cYou do not have permission."
  player-only: "&cOnly players can use this command."
  usage-send: "&e/mail send <player|all|allonline|name;name> <message>"
  usage-voucher-send: "&e/mail voucher send <voucher> <player|all|allonline|name;name>"
  usage-voucher-sendall: "&e/mail voucher sendall <voucher>"
  sent: "&aMail sent to &f%count% &aplayer(s)."
  reloaded: "&aPostMaster configuration reloaded."
